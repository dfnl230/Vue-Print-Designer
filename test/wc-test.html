<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Component Test</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 100vh;
        overflow: hidden;
        background-color: #f5f5f5;
        display: flex;
        flex-direction: column;
      }
      print-designer {
        display: block;
        width: 100%;
        height: 100%;
        flex: 1;
      }

      /* 悬浮按钮样式 */
      .floating-action-btn {
        position: fixed;
        right: 30px;
        bottom: 30px;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background-color: #1890ff;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        box-shadow: 0 4px 12px rgba(24, 144, 255, 0.4);
        cursor: grab;
        z-index: 9999;
        transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      .floating-action-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(24, 144, 255, 0.5);
        background-color: #40a9ff;
      }
      .floating-action-btn.dragging {
        transition: none;
        transform: scale(1.05);
        box-shadow: 0 8px 24px rgba(24, 144, 255, 0.6);
        cursor: grabbing;
      }

      /* 模态框样式 */
      .test-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.45);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
      }
      .test-modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }
      .test-modal-content {
        background: white;
        border-radius: 8px;
        width: 640px;
        max-width: 90vw;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        box-shadow:
          0 6px 16px 0 rgba(0, 0, 0, 0.08),
          0 3px 6px -4px rgba(0, 0, 0, 0.12),
          0 9px 28px 8px rgba(0, 0, 0, 0.05);
        transform: scale(0.8);
        transition: all 0.3s cubic-bezier(0.645, 0.045, 0.355, 1);
      }
      .test-modal-overlay.active .test-modal-content {
        transform: scale(1);
      }
      .test-modal-header {
        padding: 16px 24px;
        border-bottom: 1px solid #f0f0f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }
      .test-modal-header h3 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: #333;
      }
      .test-modal-close {
        background: transparent;
        border: none;
        font-size: 16px;
        cursor: pointer;
        color: #999;
      }
      .test-modal-close:hover {
        color: #333;
      }
      .test-modal-body {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        overflow-y: auto;
      }
      .test-btn-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .test-btn-group-title {
        font-size: 14px;
        font-weight: 600;
        color: #555;
        margin: 0 0 4px 0;
        padding-bottom: 8px;
        border-bottom: 1px solid #eee;
      }
      .test-btn-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 10px;
      }
      .test-modal-body button {
        padding: 8px 12px;
        border: 1px solid #d9d9d9;
        background: #fff;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        transition: all 0.3s;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        word-break: break-word;
        line-height: 1.2;
      }
      .test-modal-body button:hover {
        color: #1890ff;
        border-color: #1890ff;
      }
      .test-btn-api {
        font-size: 11px;
        color: #999;
        margin-top: 4px;
        font-family: monospace;
        transition: all 0.3s;
      }
      .test-modal-body button:hover .test-btn-api {
        color: #69c0ff;
      }
    </style>

    <script type="module">
      // 【开发模式】: 引入 src 源码，支持热更新（HMR），适合 npm run dev 时使用
      import { PrintDesignerElement } from "../src/web-component.ts";

      // 【生产模式】: 引入 dist 构建产物，适合测试最终打包后的效果
      // 要使用下面这行，请先执行 `npm run build:wc`，然后注释掉上面的源码引入
      // import { PrintDesignerElement } from '../dist/print-designer.es.js';
      // 并且如果是生产模式，别忘了引入 css 文件（在 head 中加入 <link rel="stylesheet" href="../dist/print-designer.css">）

      const designer = document.querySelector("print-designer");
      const designerFontStorageKey = "print-designer-font-family";

      const ensureFontStylesheet = (url) => {
        const normalized = (url || "").trim();
        if (!normalized) return Promise.resolve(false);

        const existing = Array.from(
          document.querySelectorAll("link[data-wc-test-font-url]"),
        ).find((link) => link.dataset.wcTestFontUrl === normalized);
        if (existing) return Promise.resolve(true);

        return new Promise((resolve, reject) => {
          const link = document.createElement("link");
          link.rel = "stylesheet";
          link.href = normalized;
          link.dataset.wcTestFontUrl = normalized;
          link.onload = () => resolve(true);
          link.onerror = () =>
            reject(new Error(`字体 CSS 加载失败: ${normalized}`));
          document.head.appendChild(link);
        });
      };

      const getToolbarFontOptionLabels = () => {
        const root = designer.shadowRoot;
        if (!root) return [];
        const targetSelect = Array.from(root.querySelectorAll("select")).find(
          (select) => {
            const title = (select.getAttribute("title") || "").trim();
            return title === "字体" || title === "Font Family";
          },
        );
        if (!targetSelect) return [];
        return Array.from(targetSelect.options).map((option) =>
          (option.textContent || "").trim(),
        );
      };

      const initDesigner = () => {
        console.log("Designer is ready!");

        // 测试：1. 设置模版列表自定义菜单
        // API: setTemplateContextMenu(config)
        // 说明: 用于向左侧面板的“模板列表”中每个模板项的右键/更多操作菜单中添加自定义项。
        // config 支持 mode ('append' | 'replace') 和 items 数组。
        // items 可配置 actionKey (内置动作) 或 eventName (触发自定义事件)。
        designer.setTemplateContextMenu({
          mode: "append",
          items: [
            {
              key: "copy",
              label: "自定义复制 (material-symbols)",
              actionKey: "copy",
              icon: "material-symbols:content-copy",
              eventName: "custom-element-sync",
            },
            {
              key: "custom-image",
              label: "外部图片 (测试)",
              iconImage: "https://api.iconify.design/logos:vue.svg",
              eventName: "custom-element-sync",
            },
          ],
        });

        // 测试：2. 设置自定义元素列表自定义菜单
        // API: setCustomElementContextMenu(config)
        // 说明: 向左侧面板“自定义元素”列表项的菜单中追加自定义操作。
        designer.setCustomElementContextMenu({
          mode: "append",
          items: [
            {
              key: "editElement",
              label: "编辑 (material-symbols)",
              actionKey: "editElement",
              icon: "material-symbols:edit",
            },
            {
              key: "custom-sync",
              label: "同步到云端 (material-symbols)",
              icon: "material-symbols:cloud-upload",
              eventName: "custom-element-sync",
            },
          ],
        });

        // 测试：设置可用的变量面板数据
        designer.setAvailableVariables([
          {
            id: "company",
            label: "公司信息",
            children: [
              { id: "company.name", label: "公司名称", isArray: false },
              { id: "company.address", label: "公司地址", isArray: false },
              { id: "company.phone", label: "联系电话", isArray: false },
            ],
          },
          {
            id: "order",
            label: "订单信息",
            children: [
              { id: "order.id", label: "订单号", isArray: false },
              { id: "order.date", label: "下单日期", isArray: false },
              { id: "order.customer", label: "客户姓名", isArray: false },
              { id: "order.amount", label: "订单总额", isArray: false },
            ],
          },
          {
            id: "items",
            label: "商品明细 (表格)",
            isArray: true,
            children: [
              { id: "items.name", label: "商品名称", isArray: false },
              { id: "items.sku", label: "商品编码", isArray: false },
              { id: "items.price", label: "单价", isArray: false },
              { id: "items.quantity", label: "数量", isArray: false },
              { id: "items.total", label: "小计", isArray: false },
            ],
          },
        ]);

        // 测试：3. 通过 API 直接配置新建/编辑/复制 modal 的自定义表单
        // API: setTemplateModalForm(config)
        // 说明: 全局配置模板的“新建(create)”、“编辑(edit)”和“复制(copy)”弹窗的表单项。
        // 如果模板自身有 `ext.templateModalForm`，则会覆盖全局配置。
        designer.setTemplateModalForm({
          create: {
            fields: [
              {
                key: "name",
                label: "名称",
                type: "input",
                required: true,
                placeholder: "请输入名称",
              },
              {
                key: "category",
                label: "分类",

      // 浮动按钮与 Modal 的交互及拖拽逻辑
      const floatingBtn = document.getElementById("btn-floating-test");
      const testModal = document.getElementById("test-modal");
      const btnCloseModal = document.getElementById("btn-close-test-modal");

      let isDraggingBtn = false;
      let hasBtnMoved = false;
      let dragStartX = 0,
        dragStartY = 0;
      let initialBtnLeft = 0,
        initialBtnTop = 0;

      const onBtnDragStart = (e) => {
        if (e.type === "mousedown" && e.button !== 0) return; // 仅响应鼠标左键

        isDraggingBtn = true;
        hasBtnMoved = false;

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        dragStartX = clientX;
        dragStartY = clientY;

        const rect = floatingBtn.getBoundingClientRect();
        initialBtnLeft = rect.left;
        initialBtnTop = rect.top;

        // 切换为 left/top 定位
        floatingBtn.style.right = "auto";
        floatingBtn.style.bottom = "auto";
        floatingBtn.style.left = initialBtnLeft + "px";
        floatingBtn.style.top = initialBtnTop + "px";

        floatingBtn.classList.add("dragging");
      };

      const onBtnDragMove = (e) => {
        if (!isDraggingBtn) return;

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const dx = clientX - dragStartX;
        const dy = clientY - dragStartY;

        // 移动超过 3px 认为是拖拽而不是点击
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
          hasBtnMoved = true;
        }

        if (hasBtnMoved) {
          e.preventDefault(); // 防止页面滚动
          let newLeft = initialBtnLeft + dx;
          let newTop = initialBtnTop + dy;

          // 限制在屏幕范围内
          const maxX = window.innerWidth - floatingBtn.offsetWidth;
          const maxY = window.innerHeight - floatingBtn.offsetHeight;

          newLeft = Math.max(0, Math.min(newLeft, maxX));
          newTop = Math.max(0, Math.min(newTop, maxY));

          floatingBtn.style.left = newLeft + "px";
          floatingBtn.style.top = newTop + "px";
        }
      };

      const onBtnDragEnd = () => {
        if (!isDraggingBtn) return;
        isDraggingBtn = false;
        floatingBtn.classList.remove("dragging");
      };

      // 绑定拖拽事件
      floatingBtn.addEventListener("mousedown", onBtnDragStart);
      window.addEventListener("mousemove", onBtnDragMove, { passive: false });
      window.addEventListener("mouseup", onBtnDragEnd);

      floatingBtn.addEventListener("touchstart", onBtnDragStart, {
        passive: false,
      });
      window.addEventListener("touchmove", onBtnDragMove, { passive: false });
      window.addEventListener("touchend", onBtnDragEnd);

      // 点击事件（拖拽结束后阻止点击）
      floatingBtn.addEventListener("click", (e) => {
        if (hasBtnMoved) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        testModal.classList.add("active");
      });

      btnCloseModal.addEventListener("click", () => {
        testModal.classList.remove("active");
      });

      // 点击 Modal 背景也可以关闭
      testModal.addEventListener("click", (e) => {
        if (e.target === testModal) {
          testModal.classList.remove("active");
        }
      });

      // 注册组件（如果内部未自动注册）
      if (!customElements.get("print-designer")) {
        customElements.define("print-designer", PrintDesignerElement);
